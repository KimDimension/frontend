name: Frontend CI/CD

on:
  push:
    branches: [main]

jobs:
  # ── 1단계: CI (빌드 체크) ──────────────────────────────────
  ci:
    name: CI — Type Check & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build (타입 체크 포함)
        run: npm run build
        env:
          # CI 빌드용 더미 URL (실제 배포 이미지는 build-arg로 주입)
          VITE_API_BASE_URL: http://localhost:8000

  # ── 2단계: Docker 이미지 빌드 & Artifact Registry 푸시 ──────
  build-and-push:
    name: Build & Push Image
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-northeast3-docker.pkg.dev

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.prod
          push: true
          tags: |
            asia-northeast3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/capd/frontend:latest
            asia-northeast3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/capd/frontend:sha-${{ github.sha }}
          # VITE 환경변수는 빌드 타임에 주입 (nginx 정적 서빙이므로 런타임 주입 불가)
          build-args: |
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 3단계: Cloud Run 배포 ─────────────────────────────────
  deploy:
    name: Deploy to Cloud Run
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: capd-frontend
          image: asia-northeast3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/capd/frontend:latest
          region: asia-northeast3
          flags: >-
            --service-account=capd-runner@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com
            --allow-unauthenticated
            --port=80
